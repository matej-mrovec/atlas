<!doctype html>
<html lang="cs">
    <head>
        <title>Atlas států</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            crossorigin="anonymous"
        />
        <style>
            body {
                background-color: #f8f9fa;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }
            main {
                flex: 1;
            }
            .card {
                transition: transform 0.2s, box-shadow 0.2s;
                height: 100%;
            }
            .card:hover {
                transform: translateY(-5px);
                box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            }
            .card-img-top {
                height: 140px;
                object-fit: cover;
                border-bottom: 1px solid #e9ecef;
            }
        </style>
    </head>

    <body>
        <header class="bg-dark text-white text-center p-4 mb-4 shadow-sm">
            <h1 class="display-5 fw-bold mb-3">Atlas států světa</h1>
            <div class="d-flex justify-content-center">
                <div class="col-md-4 col-sm-8">
                    <label for="continent" class="form-label text-light small text-uppercase">Vyberte kontinent</label>
                    <select id="continent" class="form-select form-select-lg bg-secondary text-white border-0">
                        <option value="europe" selected>Evropa</option>
                        <option value="asia">Asie</option>
                        <option value="africa">Afrika</option>
                        <option value="americas">Amerika</option>
                        <option value="oceania">Oceánie</option>
                    </select>
                </div>
            </div>
        </header>

        <main class="container mb-5">
            <div class="row g-4" id="countries-list"></div>
        </main>

        <footer class="bg-dark p-4 text-light text-center border-top border-secondary mt-auto">
             &copy; 2026 IT2 - Matěj Mrovec
        </footer>

        <div class="modal fade" id="one-country" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
              <div class="modal-content shadow-lg">
                <div class="modal-header bg-primary text-white">
                  <h4 class="modal-title fw-bold" id="modal-country-title">Název státu</h4>
                  <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
          
                <div class="modal-body" id="modal-body-content">
                  </div>
          
                <div class="modal-footer bg-light">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Zavřít</button>
                </div>
              </div>
            </div>
        </div>
                
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            crossorigin="anonymous"
        ></script>
        <script src="atlas.js"></script>
    </body>
</html>
